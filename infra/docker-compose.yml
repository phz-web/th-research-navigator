# Local development infrastructure for Tourism & Hospitality Research Navigator.
# Usage: from the repo root, `docker compose -f infra/docker-compose.yml up -d`
# Data persists in ./infra/postgres/data and ./infra/typesense/data (gitignored).

services:
  postgres:
    image: postgres:16-alpine
    container_name: thrn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-thrn}
      POSTGRES_USER: ${POSTGRES_USER:-thrn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-locally}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thrn} -d ${POSTGRES_DB:-thrn}"]
      interval: 5s
      timeout: 5s
      retries: 10

  typesense:
    image: typesense/typesense:0.25.2
    container_name: thrn-typesense
    restart: unless-stopped
    command: >
      --data-dir /data
      --api-key=${TYPESENSE_ADMIN_API_KEY:-change-me-locally}
      --listen-port 8108
      --enable-cors
    ports:
      - "${TYPESENSE_PORT:-8108}:8108"
    volumes:
      - ./typesense/data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8108/health"]
      interval: 5s
      timeout: 5s
      retries: 10
